<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Notice</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#fff;
    width:90%;
    max-width:500px;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    text-align:center;
}

.icon{
    font-size:60px;
    margin-bottom:15px;
}

h1{
    color:#d32f2f;
    margin-bottom:15px;
}

p{
    color:#555;
    font-size:18px;
    line-height:1.6;
}

.name{
    margin-top:30px;
    font-size:22px;
    font-weight:bold;
    color:#1565c0;
}

footer{
    margin-top:25px;
    color:#888;
    font-size:14px;
}
</style>
</head>

<body>

<div class="card">
    <div class="icon">❤️</div>

    <h1>My Body Is Weak and I Am Sick</h1>

    <p>
        I am currently feeling unwell and my body is weak.
        I appreciate your understanding and support while I recover.
    </p>

    <div class="name">
        — Oluwadamilare Moses
    </div>

    <footer>
        Wishing for a speedy recovery.
    </footer>
</div>

</body>
</html>
